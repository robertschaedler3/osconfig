      value: 1
  - name: Audit Security System Extension
    type: Microsoft.Windows/AuditPolicy
    properties:
      subcategory: "{0CCE9211-69AE-11D9-BED3-505054503030}"
      value: 1
  - name: Audit Sensitive Privilege Use
    type: Microsoft.Windows/AuditPolicy
    properties:
      subcategory: "{0CCE9228-69AE-11D9-BED3-505054503030}"
      value: 3
  - name: Audit Special Logon
    type: Microsoft.Windows/AuditPolicy
    properties:
      subcategory: "{0CCE921B-69AE-11D9-BED3-505054503030}"
      value: 1
  - name: Audit System Integrity
    type: Microsoft.Windows/AuditPolicy
    properties:
      subcategory: "{0CCE9212-69AE-11D9-BED3-505054503030}"
      value: 3
  - name: Audit User Account Management
    type: Microsoft.Windows/AuditPolicy
    properties:
      subcategory: "{0CCE9235-69AE-11D9-BED3-505054503030}"
      value: 3
  - name: "Network access: Remotely accessible registry paths"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\SecurePipeServers\Winreg\AllowedExactPaths
      valueName: Machine
      valueType: REG_MULTI_SZ
      value:
        - System\\CurrentControlSet\\Control\\ProductOptions
        - System\\CurrentControlSet\\Control\\Server Applications
        - Software\\Microsoft\\Windows NT\\CurrentVersion
  - name: "Network access: Remotely accessible registry paths and sub-paths"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\SecurePipeServers\Winreg\AllowedPaths
      valueName: Machine
      valueType: REG_MULTI_SZ
      value:
        - System\\CurrentControlSet\\Control\\Print\\Printers
        - System\\CurrentControlSet\\Services\\Eventlog
        - Software\\Microsoft\\OLAP Server
        - Software\\Microsoft\\Windows NT\\CurrentVersion\\Print
        - Software\\Microsoft\\Windows NT\\CurrentVersion\\Windows
        - System\\CurrentControlSet\\Control\\ContentIndex
        - System\\CurrentControlSet\\Control\\Terminal Server
        - System\\CurrentControlSet\\Control\\Terminal Server\\UserConfig
        - System\\CurrentControlSet\\Control\\Terminal Server\\DefaultUserConfiguration
        - Software\\Microsoft\\Windows NT\\CurrentVersion\\Perflib
        - System\\CurrentControlSet\\Services\\SysmonLog
  - name: Detect change from default RDP port
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
      valueName: PortNumber
      valueType: REG_DWORD
      value: 3389
  - name: Configure local setting override for reporting to Microsoft MAPS
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\SpyNet
      valueName: LocalSettingOverrideSpynetReporting
      valueType: REG_DWORD
      value: 0
  - name: Disable SMB v1 server
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
      valueName: SMB1
      valueType: REG_DWORD
      value: 0
  - name: Disable Windows Search Service
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\System\CurrentControlSet\Services\Wsearch
      valueName: Start
      valueType: REG_DWORD
      value: 4
  - name: Scan removable drives
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Scan
      valueName: DisableRemovableDriveScanning
      valueType: REG_DWORD
      value: 0
  - name: Send file samples when further analysis is required
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\SpyNet
      valueName: SubmitSamplesConsent
      valueType: REG_DWORD
      value: 1
  - name: Turn on behavior monitoring
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection
      valueName: DisableBehaviorMonitoring
      valueType: REG_DWORD
      value: 0
  - name: "Accounts: Limit local account use of blank passwords to console logon only"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: LimitBlankPasswordUse
      valueType: REG_DWORD
      value: 1
  - name: Allow Basic authentication
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WinRM\Client
      valueName: AllowBasic
      valueType: REG_DWORD
      value: 0
  - name: Allow indexing of encrypted files
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search
      valueName: AllowIndexingEncryptedStoresOrItems
      valueType: REG_DWORD
      value: 0
  - name: Allow Input Personalization
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\InputPersonalization
      valueName: AllowInputPersonalization
      valueType: REG_DWORD
      value: 0
  - name: Allow Microsoft accounts to be optional
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      valueName: MSAOptional
      valueType: REG_DWORD
      value: 1
  - name: Allow Diagnostic Data
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
      valueName: AllowTelemetry
      valueType: REG_DWORD
      value: 1
  - name: Allow unencrypted traffic
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WinRM\Client
      valueName: AllowUnencryptedTraffic
      valueType: REG_DWORD
      value: 0
  - name: Allow user control over installs
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer
      valueName: EnableUserControl
      valueType: REG_DWORD
      value: 0
  - name: Always install with elevated privileges
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer
      valueName: AlwaysInstallElevated
      valueType: REG_DWORD
      value: 0
  - name: Always prompt for password upon connection
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
      valueName: fPromptForPassword
      valueType: REG_DWORD
      value: 1
  - name: "Application: Control Event Log behavior when the log file reaches its maximum size"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\EventLog\Application
      valueName: Retention
      valueType: REG_SZ
      value: "0"
  - name: "Application: Specify the maximum log file size (KB)"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\EventLog\Application
      valueName: MaxSize
      valueType: REG_DWORD
      value: 32768
  - name: "Audit: Force audit policy subcategory settings (Windows Vista or later) to override audit policy category settings"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: SCENoApplyLegacyAuditPolicy
      valueType: REG_DWORD
      value: 1
  - name: "Audit: Shut down system immediately if unable to log security audits"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: CrashOnAuditFail
      valueType: REG_DWORD
      value: 0
  - name: Block user from showing account details on sign-in
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\Software\Policies\Microsoft\Windows\System
      valueName: BlockUserFromShowingAccountDetailsOnSignin
      valueType: REG_DWORD
      value: 1
  - name: Boot-Start Driver Initialization Policy
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Policies\EarlyLaunch
      valueName: DriverLoadPolicy
      valueType: REG_DWORD
      value: 3
  - name: Configure Offer Remote Assistance
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
      valueName: fAllowUnsolicited
      valueType: REG_DWORD
      value: 0
  - name: Configure Solicited Remote Assistance
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
      valueName: fAllowToGetHelp
      valueType: REG_DWORD
      value: 0
  - name: Configure Windows SmartScreen
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\System
      valueName: EnableSmartScreen
      valueType: REG_DWORD
      value: 1
  - name: Ensure 'Continue experiences on this device' is set to 'Disabled'
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\System
      valueName: EnableCdp
      valueType: REG_DWORD
      value: 0
  - name: "Devices: Allowed to format and eject removable media"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
      valueName: AllocateDASD
      valueType: REG_SZ
      value: "0"
  - name: "Devices: Prevent users from installing printer drivers"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Print\Providers\LanMan Print Services\Servers
      valueName: AddPrinterDrivers
      valueType: REG_DWORD
      value: 1
  - name: Disallow Autoplay for non-volume devices
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
      valueName: NoAutoplayfornonVolume
      valueType: REG_DWORD
      value: 1
  - name: Disallow Digest authentication
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WinRM\Client
      valueName: AllowDigest
      valueType: REG_DWORD
      value: 0
  - name: Disallow WinRM from storing RunAs credentials
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WinRM\Service
      valueName: DisableRunAs
      valueType: REG_DWORD
      value: 1
  - name: Do not allow passwords to be saved
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
      valueName: DisablePasswordSaving
      valueType: REG_DWORD
      value: 1
  - name: Do not delete temp folders upon exit
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
      valueName: DeleteTempDirsOnExit
      valueType: REG_DWORD
      value: 1
  - name: Do not display network selection UI
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\System
      valueName: DontDisplayNetworkSelectionUI
      valueType: REG_DWORD
      value: 1
  - name: Do not display the password reveal button
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CredUI
      valueName: DisablePasswordReveal
      valueType: REG_DWORD
      value: 1
  - name: Do not show feedback notifications
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
      valueName: DoNotShowFeedbackNotifications
      valueType: REG_DWORD
      value: 1
  - name: Do not use temporary folders per session
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
      valueName: PerSessionTempDir
      valueType: REG_DWORD
      value: 1
  - name: Enable insecure guest logons
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\LanmanWorkstation
      valueName: AllowInsecureGuestAuth
      valueType: REG_DWORD
      value: 0
  - name: Enable Windows NTP Client
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\NtpClient
      valueName: Enabled
      valueType: REG_DWORD
      value: 1
  - name: Enumerate administrator accounts on elevation
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\CredUI
      valueName: EnumerateAdministrators
      valueType: REG_DWORD
      value: 0
  - name: Include command line in process creation events
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\Audit
      valueName: ProcessCreationIncludeCmdLine_Enabled
      valueType: REG_DWORD
      value: 1
  - name: "Interactive logon: Do not display last user name"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      valueName: DontDisplayLastUserName
      valueType: REG_DWORD
      value: 1
  - name: "Interactive logon: Do not require CTRL+ALT+DEL"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      valueName: DisableCAD
      valueType: REG_DWORD
      value: 0
  - name: "Microsoft network client: Digitally sign communications (always)"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters
      valueName: RequireSecuritySignature
      valueType: REG_DWORD
      value: 1
  - name: "Microsoft network client: Digitally sign communications (if server agrees)"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters
      valueName: EnableSecuritySignature
      valueType: REG_DWORD
      value: 1
  - name: "Microsoft network client: Send unencrypted password to third-party SMB servers"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters
      valueName: EnablePlainTextPassword
      valueType: REG_DWORD
      value: 0
  - name: "Microsoft network server: Amount of idle time required before suspending session"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
      valueName: AutoDisconnect
      valueType: REG_DWORD
      value: 15
  - name: "Microsoft network server: Digitally sign communications (always)"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
      valueName: RequireSecuritySignature
      valueType: REG_DWORD
      value: 1
  - name: "Microsoft network server: Digitally sign communications (if client agrees)"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
      valueName: EnableSecuritySignature
      valueType: REG_DWORD
      value: 1
  - name: "Microsoft network server: Disconnect clients when logon hours expire"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
      valueName: EnableForcedLogoff
      valueType: REG_DWORD
      value: 1
  - name: Minimize the number of simultaneous connections to the Internet or a Windows Domain
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WcmSvc\GroupPolicy
      valueName: fMinimizeConnections
      valueType: REG_DWORD
      value: 1
  - name: "Network access: Do not allow anonymous enumeration of SAM accounts and shares"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: RestrictAnonymous
      valueType: REG_DWORD
      value: 1
  - name: "Network access: Do not allow anonymous enumeration of SAM accounts"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: RestrictAnonymousSAM
      valueType: REG_DWORD
      value: 1
  - name: "Network access: Let Everyone permissions apply to anonymous users"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: EveryoneIncludesAnonymous
      valueType: REG_DWORD
      value: 0
  - name: "Network access: Restrict anonymous access to Named Pipes and Shares"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
      valueName: RestrictNullSessAccess
      valueType: REG_DWORD
      value: 1
  - name: "Network access: Restrict clients allowed to make remote calls to SAM"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: RestrictRemoteSAM
      valueType: REG_SZ
      value: O:BAG:BAD:(A;;RC;;;BA)
  - name: "Network access: Shares that can be accessed anonymously"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
      valueName: NullSessionShares
      valueType: REG_MULTI_SZ
      value:
        - ""
  - name: "Network access: Sharing and security model for local accounts"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: ForceGuest
      valueType: REG_DWORD
      value: 0
  - name: "Network security: Allow Local System to use computer identity for NTLM"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: UseMachineId
      valueType: REG_DWORD
      value: 1
  - name: "Network security: Allow LocalSystem NULL session fallback"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0
      valueName: AllowNullSessionFallback
      valueType: REG_DWORD
      value: 0
  - name: "Network Security: Allow PKU2U authentication requests to this computer to use online identities"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\pku2u
      valueName: AllowOnlineID
      valueType: REG_DWORD
      value: 0
  - name: "Network Security: Configure encryption types allowed for Kerberos"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\Kerberos\Parameters
      valueName: SupportedEncryptionTypes
      valueType: REG_DWORD
      value: 2147483640
  - name: "Network security: Do not store LAN Manager hash value on next password change"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: NoLMHash
      valueType: REG_DWORD
      value: 1
  - name: "Network security: LAN Manager authentication level"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      valueName: LmCompatibilityLevel
      valueType: REG_DWORD
      value: 5
  - name: "Network security: LDAP client signing requirements"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Services\LDAP
      valueName: LDAPClientIntegrity
      valueType: REG_DWORD
      value: 1
  - name: "Network security: Minimum session security for NTLM SSP based (including secure RPC) clients"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0
      valueName: NTLMMinClientSec
      valueType: REG_DWORD
      value: 537395200
  - name: "Network security: Minimum session security for NTLM SSP based (including secure RPC) servers"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0
      valueName: NTLMMinServerSec
      valueType: REG_DWORD
      value: 537395200
  - name: Prevent downloading of enclosures
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Internet Explorer\Feeds
      valueName: DisableEnclosureDownload
      valueType: REG_DWORD
      value: 1
  - name: Prohibit installation and configuration of Network Bridge on your DNS domain network
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Network Connections
      valueName: NC_AllowNetBridge_NLA
      valueType: REG_DWORD
      value: 0
  - name: Prohibit use of Internet Connection Sharing on your DNS domain network
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Network Connections
      valueName: NC_ShowSharedAccessUI
      valueType: REG_DWORD
      value: 0
  - name: Require secure RPC communication
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
      valueName: fEncryptRPCTraffic
      valueType: REG_DWORD
      value: 1
  - name: "Security: Control Event Log behavior when the log file reaches its maximum size"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\EventLog\Security
      valueName: Retention
      valueType: REG_SZ
      value: "0"
  - name: "Security: Specify the maximum log file size (KB)"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\EventLog\Security
      valueName: MaxSize
      valueType: REG_DWORD
      value: 196608
  - name: Set client connection encryption level
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
      valueName: MinEncryptionLevel
      valueType: REG_DWORD
      value: 3
  - name: Set the default behavior for AutoRun
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
      valueName: NoAutorun
      valueType: REG_DWORD
      value: 1
  - name: "Setup: Control Event Log behavior when the log file reaches its maximum size"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\EventLog\Setup
      valueName: Retention
      valueType: REG_SZ
      value: "0"
  - name: "Setup: Specify the maximum log file size (KB)"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Policies\Microsoft\Windows\EventLog\Setup
      valueName: MaxSize
      valueType: REG_DWORD
      value: 32768
  - name: "Shutdown: Allow system to be shut down without having to log on"
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      valueName: ShutdownWithoutLogon
