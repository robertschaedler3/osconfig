    properties:
      subcategory: "{0CCE922F-69AE-11D9-BED3-505054503030}"
      value: 1
  - name: Audit Process Creation
    type: Microsoft.Windows/AuditPolicy
    properties:
      subcategory: "{0CCE922B-69AE-11D9-BED3-505054503030}"
      value: 1
  - name: Audit Removable Storage
    type: Microsoft.Windows/AuditPolicy
